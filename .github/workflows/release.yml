name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.1)'
        required: true
        type: string
      previous_tag:
        description: 'Previous release tag to compare (e.g., v1.0.0). Empty = auto-detect latest'
        required: false
        type: string
      compatibility:
        description: 'Platform compatibility (e.g., Windows 10+, macOS 10.13+, Android 8+)'
        required: false
        type: string
        default: 'Windows 10+, macOS 10.13+, Android 8+'
      detail_level:
        description: 'Release notes depth'
        required: false
        type: choice
        default: standard
        options:
          - brief
          - standard
          - detailed
      model:
        description: 'Groq model override (empty = use action default)'
        required: false
        type: string
      notes_style:
        description: 'Release notes layout (desqta = emoji sections, github = standard)'
        required: false
        type: choice
        default: desqta
        options:
          - desqta
          - github
      plain_language:
        description: 'Use simple, jargon-free language anyone can understand'
        required: false
        type: boolean
        default: true
      body_template:
        description: 'Custom structure for release notes (multiline). Empty = use DesQTA layout'
        required: false
        type: string
      show_diff_section:
        description: 'Append diff section at bottom of release notes'
        required: false
        type: boolean
        default: false
      prompt_append:
        description: 'Extra instructions for AI (tone, audience, context)'
        required: false
        type: string
      system_append:
        description: 'Extra system constraints/behavior for AI'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install

      - name: Generate app icons
        run: pnpm tauri icon static/app-icon.svg

      - name: Build Windows
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**
            src-tauri/target/x86_64-pc-windows-msvc/release/*.sig

  build-macos-intel:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install

      - name: Generate app icons
        run: pnpm tauri icon static/app-icon.svg

      - name: Normalize macOS signing environment
        env:
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ "$APPLE_CERTIFICATE_PASSWORD_SECRET" = "__EMPTY__" ]; then
            echo "APPLE_CERTIFICATE_PASSWORD=" >> "$GITHUB_ENV"
          else
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Create App Store Connect API key file
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%b' "$APPLE_API_KEY_CONTENT" > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build macOS Intel
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target x86_64-apple-darwin

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-x86_64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/**
            src-tauri/target/x86_64-apple-darwin/release/*.sig

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install

      - name: Generate app icons
        run: pnpm tauri icon static/app-icon.svg

      - name: Normalize macOS signing environment
        env:
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ "$APPLE_CERTIFICATE_PASSWORD_SECRET" = "__EMPTY__" ]; then
            echo "APPLE_CERTIFICATE_PASSWORD=" >> "$GITHUB_ENV"
          else
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Create App Store Connect API key file
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%b' "$APPLE_API_KEY_CONTENT" > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build macOS ARM
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Upload macOS ARM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-aarch64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/**
            src-tauri/target/aarch64-apple-darwin/release/*.sig

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev build-essential libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Generate app icons
        run: pnpm tauri icon static/app-icon.svg

      - name: Build Linux (.deb, .AppImage, .rpm)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: src-tauri/target/release/bundle/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-platform: '34'
          sdk-build-tools: '34.0.0'
          ndk-version: '25.2.9519653'
          cmake-version: '3.22.1'

      - name: Set up Android environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "GRADLE_OPTS=-Dorg.gradle.java.home=$JAVA_HOME -Xmx4g -XX:+HeapDumpOnOutOfMemoryError" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_NDK_HOME" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install

      - name: Generate app icons
        run: pnpm tauri icon static/app-icon.svg

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Verify NDK installation
        run: |
          echo "Checking NDK installation..."
          ls -la $ANDROID_NDK_HOME
          echo "NDK version:"
          $ANDROID_NDK_HOME/ndk-build --version || echo "ndk-build not found"
          echo "Available NDK tools:"
          ls -la $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/ | head -10

      - name: Fix Gradle Java home
        run: |
          echo "Fixing Gradle Java home for Linux..."
          cat > src-tauri/gen/android/gradle.properties << EOF
          org.gradle.java.home=$JAVA_HOME
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.configureondemand=true
          android.suppressUnsupportedCompileSdk=36
          EOF

      - name: Build Android APKs (all architectures)
        run: |
          echo "Building with JAVA_HOME: $JAVA_HOME"
          JAVA_HOME=$JAVA_HOME GRADLE_OPTS="-Dorg.gradle.java.home=$JAVA_HOME -Xmx4g -XX:+HeapDumpOnOutOfMemoryError" pnpm tauri android build

      - name: List built APKs
        run: |
          echo "Built Android APKs:"
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: src-tauri/gen/android/app/build/outputs/apk/*/release/*.apk

  create-release:
    needs: [build-windows, build-macos-intel, build-macos-arm, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Find updater artifact files
        id: find-files
        run: |
          output_file() {
            local key="$1"
            local path="$2"
            if [ -n "$path" ]; then
              echo "$key=$(basename "$path")" >> "$GITHUB_OUTPUT"
            else
              echo "$key=" >> "$GITHUB_OUTPUT"
            fi
          }

          windows_exe=$(find artifacts/windows-x86_64 -type f \( -name '*.exe' -o -name '*.msi' \) -not -name '*.sig' | head -1)
          macos_x86_app=$(find artifacts/darwin-x86_64 -type f \( -name '*.app.tar.gz' -o -name '*.dmg' \) -not -name '*.sig' | head -1)
          macos_arm_app=$(find artifacts/darwin-aarch64 -type f \( -name '*.app.tar.gz' -o -name '*.dmg' \) -not -name '*.sig' | head -1)
          linux_appimage=$(find artifacts/linux-builds -type f -name '*.AppImage.tar.gz' -not -name '*.sig' | head -1)

          output_file windows_file "$windows_exe"
          output_file macos_x86_file "$macos_x86_app"
          output_file macos_arm_file "$macos_arm_app"
          output_file linux_x86_file "$linux_appimage"

      - name: Get release asset URLs
        id: get-urls
        run: |
          RELEASE_TAG="v${{ inputs.version }}"
          REPO="BetterSEQTA/DesQTA"
          echo "base_url=https://github.com/$REPO/releases/download/$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Read updater signatures
        id: read-sigs
        run: |
          read_sig() {
            local file_path="$1"
            if [ -n "$file_path" ] && [ -f "$file_path" ]; then
              tr -d '\n' < "$file_path"
            fi
          }

          windows_sig_file=$(find artifacts/windows-x86_64 -type f \( -name '*.exe.sig' -o -name '*.msi.sig' -o -name '*setup.exe.sig' \) | head -1)
          if [ -z "$windows_sig_file" ]; then
            windows_sig_file=$(find artifacts/windows-x86_64 -type f -name '*.sig' | grep -E '(exe|msi|setup)' | head -1)
          fi
          macos_x86_sig_file=$(find artifacts/darwin-x86_64 -type f \( -name '*.app.tar.gz.sig' -o -name '*.dmg.sig' \) | head -1)
          macos_arm_sig_file=$(find artifacts/darwin-aarch64 -type f \( -name '*.app.tar.gz.sig' -o -name '*.dmg.sig' \) | head -1)
          linux_x86_sig_file=$(find artifacts/linux-builds -type f -name '*.AppImage.tar.gz.sig' | head -1)

          windows_sig=$(read_sig "$windows_sig_file")
          macos_x86_sig=$(read_sig "$macos_x86_sig_file")
          macos_arm_sig=$(read_sig "$macos_arm_sig_file")
          linux_x86_sig=$(read_sig "$linux_x86_sig_file")

          echo "windows_sig<<EOF" >> $GITHUB_OUTPUT
          echo "$windows_sig" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "macos_x86_sig<<EOF" >> $GITHUB_OUTPUT
          echo "$macos_x86_sig" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "macos_arm_sig<<EOF" >> $GITHUB_OUTPUT
          echo "$macos_arm_sig" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "linux_x86_sig<<EOF" >> $GITHUB_OUTPUT
          echo "$linux_x86_sig" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Collect artifact paths for release
        id: artifact-paths
        run: |
          paths=$(find artifacts -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.sig' -o -name '*.dmg' -o -name '*.apk' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \) | tr '\n' ',')
          paths="${paths%,}"
          echo "paths=$paths" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: ai-release-notes
        uses: StroepWafel/AI-Release-Notes@v1.0.0
        with:
          groq_api_key: ${{ secrets.GROQ_API_KEY }}
          tag_name: v${{ inputs.version }}
          previous_tag: ${{ inputs.previous_tag }}
          release_name: DesQTA v${{ inputs.version }}
          draft: true
          detail_level: ${{ inputs.detail_level }}
          compatibility: ${{ inputs.compatibility }}
          model: ${{ inputs.model }}
          notes_style: ${{ inputs.notes_style }}
          product_name: DesQTA
          plain_language: ${{ inputs.plain_language }}
          body_template: ${{ inputs.body_template }}
          show_diff_section: ${{ inputs.show_diff_section }}
          prompt_append: ${{ inputs.prompt_append }}
          system_append: ${{ inputs.system_append }}
          files: ${{ steps.artifact-paths.outputs.paths }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate update manifest
        run: |
          jq -n \
            --arg version "${{ inputs.version }}" \
            --arg notes "Bug fixes and improvements. See GitHub release for full changelog." \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg windows_sig "${{ steps.read-sigs.outputs.windows_sig }}" \
            --arg windows_url "${{ steps.get-urls.outputs.base_url }}/${{ steps.find-files.outputs.windows_file }}" \
            --arg macos_x86_sig "${{ steps.read-sigs.outputs.macos_x86_sig }}" \
            --arg macos_x86_url "${{ steps.get-urls.outputs.base_url }}/${{ steps.find-files.outputs.macos_x86_file }}" \
            --arg macos_arm_sig "${{ steps.read-sigs.outputs.macos_arm_sig }}" \
            --arg macos_arm_url "${{ steps.get-urls.outputs.base_url }}/${{ steps.find-files.outputs.macos_arm_file }}" \
            --arg linux_x86_sig "${{ steps.read-sigs.outputs.linux_x86_sig }}" \
            --arg linux_x86_url "${{ steps.get-urls.outputs.base_url }}/${{ steps.find-files.outputs.linux_x86_file }}" \
            '
            def platform(sig; url):
              if (sig | length) > 0 and (url | length) > 0 and (url | endswith("/") | not)
              then { signature: sig, url: url }
              else null
              end;
            {
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                {
                  "windows-x86_64": platform($windows_sig; $windows_url),
                  "darwin-x86_64": platform($macos_x86_sig; $macos_x86_url),
                  "darwin-aarch64": platform($macos_arm_sig; $macos_arm_url),
                  "linux-x86_64": platform($linux_x86_sig; $linux_x86_url)
                }
                | with_entries(select(.value != null))
              )
            }
            ' > update-manifest.json
          cat update-manifest.json

      - name: Upload manifest to release
        run: |
          gh release upload "v${{ inputs.version }}" update-manifest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit manifest to releases branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/BetterSEQTA/DesQTA.git
          git checkout -b releases 2>/dev/null || git checkout releases || git checkout -b releases
          cp update-manifest.json latest.json
          git add latest.json
          git commit -m "Update latest.json for v${{ inputs.version }}" || exit 0
          git push origin releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
