name: Build Unsigned Tauri iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios-unsigned:
    name: Build Unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Frontend Dependencies
        run: pnpm install

      - name: Build Frontend
        run: pnpm build

      - name: Build Unsigned iOS App
        working-directory: src-tauri/gen/apple
        run: |
          PROJECT_NAME=$(ls *.xcodeproj | sed 's/\.xcodeproj//' | head -n 1)
          SCHEME_NAME="desqta_iOS"

          echo "Building project: $PROJECT_NAME with scheme: $SCHEME_NAME"

          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package .app into .ipa
        working-directory: src-tauri/gen/apple
        run: |
          PROJECT_NAME=$(ls *.xcodeproj | sed 's/\.xcodeproj//' | head -n 1)

          mkdir -p Payload
          cp -r ./build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r "${PROJECT_NAME}_unsigned.ipa" Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: src-tauri/gen/apple/*_unsigned.ipa
          retention-days: 7
