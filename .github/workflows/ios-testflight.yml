name: iOS TestFlight

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-upload:
    name: Build and Upload to TestFlight
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install dependencies
        run: pnpm install

      - name: Generate app icons
        run: pnpm tauri icon static/app-icon.svg

      - name: Create App Store Connect API key file
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%b' "$APPLE_API_KEY_CONTENT" > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build signed iOS app
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: pnpm tauri ios build --export-method app-store-connect --target aarch64

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-testflight-build
          path: src-tauri/gen/apple/build/**/*.ipa
          retention-days: 14

      - name: Upload IPA to TestFlight
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          ipa_path=$(find src-tauri/gen/apple/build -name '*.ipa' -type f | head -1)

          if [ -z "$ipa_path" ]; then
            echo 'No IPA found to upload.'
            exit 1
          fi

          xcrun altool \
            --upload-app \
            --type ios \
            --file "$ipa_path" \
            --apiKey "$APPLE_API_KEY" \
            --apiIssuer "$APPLE_API_ISSUER"
